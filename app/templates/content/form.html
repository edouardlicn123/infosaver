{% extends "base.html" %}

{% block title %}{{ '编辑' if content else '创建' }}邮件内容 - 客户信息管理系统{% endblock %}

{% block content %}
<h2>{{ '编辑' if content else '创建' }}邮件内容</h2>

<form method="post" id="emailForm">
    <div class="mb-3">
        <label for="title" class="form-label">邮件标题 *</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ content.title if content else '' }}" required maxlength="200" placeholder="例如：尊敬的 {name}，您好！">
        <small class="text-muted">标题支持变量：{name}、{email}、{company}</small>
    </div>

    <div class="mb-3">
        <label for="body" class="form-label">邮件内容 *</label>
        <div id="editor-container" style="height: 300px;"></div>
        <input type="hidden" name="body" id="body">
        <small class="text-muted">内容支持变量：{name}、{email}、{company}、{position}</small>
    </div>

    <div class="mb-3">
        <label class="form-label">快捷插入变量</label>
        <div>
            <button type="button" class="btn btn-sm btn-outline-secondary me-1 mb-1" onclick="insertVariable('{name}')">{name}</button>
            <button type="button" class="btn btn-sm btn-outline-secondary me-1 mb-1" onclick="insertVariable('{email}')">{email}</button>
            <button type="button" class="btn btn-sm btn-outline-secondary me-1 mb-1" onclick="insertVariable('{company}')">{company}</button>
            <button type="button" class="btn btn-sm btn-outline-secondary me-1 mb-1" onclick="insertVariable('{position}')">{position}</button>
        </div>
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary">{{ '保存修改' if content else '创建' }}</button>
        <a href="{{ url_for('content.index') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'color': [] }, { 'background': [] }],
                ['link'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    function insertVariable(variable) {
        var cursorPosition = quill.getSelection().index;
        quill.insertText(cursorPosition, variable);
        quill.setSelection(cursorPosition + variable.length);
        quill.focus();
    }

    document.getElementById('emailForm').onsubmit = function() {
        document.getElementById('body').value = quill.root.innerHTML;
        return true;
    };

    {% if content %}
    quill.root.innerHTML = {{ content.body|tojson }};
    {% else %}
    quill.root.innerHTML = '<p><br></p>';
    {% endif %}
</script>
{% endblock %}
